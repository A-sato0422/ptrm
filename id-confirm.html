<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録確認 - PTRM</title>
    <link rel="stylesheet" href="./src/styles/main.css">
    <style>
        .confirm-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 32px 16px;
            text-align: center;
        }

        .confirm-icon {
            font-size: 72px;
            margin-bottom: 24px;
            line-height: 1;
        }

        .confirm-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--color-text-dark);
            margin-bottom: 12px;
        }

        .confirm-message {
            font-size: 15px;
            color: var(--color-text-light);
            line-height: 1.7;
            max-width: 320px;
        }

        .confirm-divider {
            width: 48px;
            height: 3px;
            background: var(--color-primary);
            border-radius: 4px;
            margin: 24px auto;
        }

        .line-id-card {
            background: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px 24px;
            max-width: 320px;
            width: 100%;
        }

        .line-id-label {
            font-size: 12px;
            color: var(--color-text-light);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .line-id-value {
            font-size: 14px;
            font-family: monospace;
            color: var(--color-text-dark);
            word-break: break-all;
            margin-bottom: 16px;
            min-height: 1.5em;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--color-primary);
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .copy-btn:active {
            opacity: 0.8;
        }

        .copy-btn.copied {
            background: #22c55e;
        }

        .confirm-note {
            font-size: 13px;
            color: var(--color-text-light);
            margin-top: 16px;
            max-width: 320px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <main class="main-content">
        <div class="confirm-page">
            <div class="confirm-icon">📋</div>
            <p class="confirm-title">まだ登録が完了していません</p>
            <p class="confirm-message">
                担当トレーナーに以下の LINE ID をお伝えください。<br>
                登録完了後、ご利用いただけるようになります。
            </p>
            <div class="confirm-divider"></div>
            <div class="line-id-card">
                <p class="line-id-label">あなたの LINE ID</p>
                <p class="line-id-value" id="line-id-display">取得中...</p>
                <button class="copy-btn" id="copy-btn" type="button">LINE ID をコピー</button>
            </div>
            <p class="confirm-note" id="copy-status"></p>
        </div>
    </main>
    <script type="module" src="./src/id-confirm.ts"></script>
</body>

</html>

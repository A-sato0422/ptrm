<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール - PTRM</title>
    <link rel="icon" type="image/png" href="/assets/icon-192.png">
    <link rel="stylesheet" href="./src/styles/main.css">
    <link rel="stylesheet" href="./src/styles/profile.css">
</head>

<body>
    <!-- ローディングオーバーレイ（認証チェック完了まで表示） -->
    <div id="loading-overlay" style="position:fixed;inset:0;z-index:999;background:#E8F6F8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation:spin 1s linear infinite">
            <circle cx="12" cy="12" r="10" stroke="#A8D8EA" stroke-width="4" opacity="0.3"/>
            <path d="M4 12a8 8 0 018-8" stroke="#A8D8EA" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <p style="color:#7F8C8D;font-size:14px;font-family:'Hiragino Kaku Gothic ProN',sans-serif;">読み込み中...</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

    <!-- #partial:header -->

    <!-- メインコンテンツ -->
    <main class="main-content" id="main-content" style="visibility:hidden;">
        <div id="profile-view" class="view active">
            <!-- 成功メッセージ -->
            <div id="success-message" class="success-message" style="display: none;">
                保存しました
            </div>
            <!-- エラーメッセージ -->
            <div id="error-message" class="error-message" style="display: none;"></div>

            <!-- プロフィールヘッダー -->
            <div class="profile-header">
                <div class="profile-avatar-container">
                    <img id="profile-avatar" src="/assets/initial-avater.png" alt="プロフィール画像" class="profile-avatar">
                </div>
                <h2 class="profile-name" id="profile-name">--</h2>
                <p class="profile-member-since" id="profile-member-since">会員登録日: --</p>
            </div>

            <!-- 基本情報 -->
            <div class="info-section">
                <h3 class="info-section-title">基本情報</h3>
                <div class="info-list">
                    <div class="info-item">
                        <span class="info-label">コース名</span>
                        <span class="info-value" id="info-course">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">現在のステージ</span>
                        <span class="info-value" id="info-stage">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">継続日数</span>
                        <span class="info-value" id="info-days">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">完了した宿題</span>
                        <span class="info-value" id="info-tasks">--</span>
                    </div>
                </div>
            </div>

            <!-- ポイント履歴 -->
            <div class="info-section">
                <h3 class="info-section-title">ポイント履歴</h3>
                <div id="point-history-list" class="point-history-list"></div>
            </div>

            <!-- アクションボタン -->
            <div class="profile-actions">
                <button id="qr-scan-btn" class="profile-action-btn qr-btn">
                    <span>ポイントを獲得する</span>
                </button>
                <button id="point-use-open-btn" class="profile-action-btn">
                    <span>ポイントを使用する</span>
                </button>
                <button id="profile-action-btn" class="profile-action-btn">
                    <span>プロフィール設定</span>
                </button>
            </div>
        </div>
    </main>

    <!-- ポイント使用モーダル -->
    <div id="point-use-modal" class="profile-modal-overlay hidden">
        <div class="profile-modal-sheet">
            <div class="profile-modal-header">
                <h3>ポイントを使用する</h3>
                <button id="point-use-close-btn" class="profile-modal-close">✕</button>
            </div>
            <div class="profile-modal-body">
                <div class="modal-field">
                    <label class="modal-field-label">使用するポイント（100pt単位）</label>
                    <div class="point-stepper">
                        <button type="button" id="point-use-minus" class="point-stepper-btn">−</button>
                        <input type="number" id="point-use-input" class="modal-field-input point-stepper-input" min="100" step="100" placeholder="例: 100">
                        <button type="button" id="point-use-plus" class="point-stepper-btn">＋</button>
                    </div>
                </div>
                <p id="point-use-error" class="point-use-modal-error" style="display:none;"></p>
            </div>
            <div class="profile-modal-footer">
                <button id="point-use-cancel-btn" class="modal-btn cancel">キャンセル</button>
                <button id="point-use-btn" class="modal-btn save">使用する</button>
            </div>
        </div>
    </div>

    <!-- QRスキャナーモーダル -->
    <div id="qr-modal" class="qr-modal-overlay hidden">
        <div class="qr-modal-sheet">
            <div class="qr-modal-header">
                <h3>QRコードをスキャン</h3>
                <button id="qr-close-btn" class="qr-modal-close">✕</button>
            </div>
            <div class="qr-modal-body">
                <div id="qr-reader"></div>
                <p class="qr-hint">カメラでQRコードを読み取ってください</p>
            </div>
        </div>
    </div>

    <!-- プロフィール設定モーダル -->
    <div id="profile-modal" class="profile-modal-overlay hidden">
        <div class="profile-modal-sheet">
            <div class="profile-modal-header">
                <h3>プロフィール設定</h3>
                <button id="modal-close-btn" class="profile-modal-close">✕</button>
            </div>
            <div class="profile-modal-body">
                <div class="modal-avatar-section">
                    <img id="modal-avatar-preview" class="modal-avatar-img" src="" alt="アバタープレビュー">
                    <label class="modal-avatar-label" for="modal-avatar-input">
                        画像を変更
                        <input type="file" id="modal-avatar-input" accept="image/*" hidden>
                    </label>
                </div>
                <div class="modal-field">
                    <label class="modal-field-label">ニックネーム</label>
                    <input type="text" id="modal-name-input" class="modal-field-input" placeholder="名前を入力" maxlength="50">
                </div>
            </div>
            <div class="profile-modal-footer">
                <button id="modal-cancel-btn" class="modal-btn cancel">キャンセル</button>
                <button id="modal-save-btn" class="modal-btn save">保存</button>
            </div>
        </div>
    </div>

    <!-- #partial:nav:profile -->

    <script type="module" src="./src/profile.ts"></script>
</body>

</html>

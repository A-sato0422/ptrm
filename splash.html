<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTRM</title>
    <link rel="icon" type="image/png" href="/assets/icon-192.png">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1a2744 50%, #0d3d56 100%);
            font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', 'Meiryo', sans-serif;
            overflow: hidden;
        }

        /* 背景の装飾サークル */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
        }
        body::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
            top: -150px;
            right: -150px;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.07) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
        }

        .splash-content {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .splash-title {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: 0.18em;
            color: #f8fafc;
            line-height: 1;
            margin-bottom: 12px;
            min-height: 1.2em;
        }

        /* TextEffectWithExit の blur-slide 風アニメーション */
        @keyframes charReveal {
            0% {
                opacity: 0;
                filter: blur(10px) brightness(0%);
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                filter: blur(0px) brightness(100%);
                transform: translateY(0);
            }
        }

        @keyframes charExit {
            0% {
                opacity: 1;
                filter: blur(0px) brightness(100%);
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                filter: blur(10px) brightness(0%);
                transform: translateY(-30px);
            }
        }

        .char {
            display: inline-block;
            opacity: 0;
            animation: charReveal 0.4s forwards;
        }
        .char.exiting {
            animation: charExit 0.4s forwards;
        }

        .splash-subtitle {
            font-size: 13px;
            color: #94a3b8;
            letter-spacing: 0.08em;
            opacity: 0;
            transform: translateY(10px);
            animation: subtitleReveal 0.5s ease forwards;
        }

        @keyframes subtitleReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes iconReveal {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ローディングバー */
        .progress-bar-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0ea5e9, #6366f1);
            animation: progressFill 2.4s linear forwards;
            border-radius: 0 2px 2px 0;
        }

        @keyframes progressFill {
            to { width: 100%; }
        }
    </style>
</head>

<body>
    <div class="splash-content">
        <p class="splash-title" id="splash-title" aria-label="PTRM"></p>
        <p class="splash-subtitle" id="splash-subtitle">パーソナル・トレーニング・ロードマップ</p>
    </div>

    <div class="progress-bar-wrapper">
        <div class="progress-bar"></div>
    </div>

    <script>
        (function () {
            const TITLE_TEXT = 'PTRM';
            const STAGGER_INTERVAL = 0.08; // 秒 (framer-motion の staggerChildren 相当)
            const REVEAL_DURATION = 0.4;   // charReveal アニメーション長さ
            const REDIRECT_DELAY = 2600;   // ms

            // タイトルを1文字ずつ <span class="char"> に分解
            const titleEl = document.getElementById('splash-title');
            const chars = TITLE_TEXT.split('').map(function (ch, i) {
                const span = document.createElement('span');
                span.className = 'char';
                span.textContent = ch;
                span.style.animationDelay = (0.45 + i * STAGGER_INTERVAL) + 's';
                titleEl.appendChild(span);
                return span;
            });

            // サブタイトルの表示タイミングを最後の文字到達後に合わせる
            const subtitleDelay = 0.45 + (TITLE_TEXT.length - 1) * STAGGER_INTERVAL + REVEAL_DURATION;
            document.getElementById('splash-subtitle').style.animationDelay = subtitleDelay + 's';

            // exit アニメーション → リダイレクト
            sessionStorage.setItem('ptrm_visited', '1');
            setTimeout(function () {
                chars.forEach(function (span, i) {
                    span.style.animation = 'none';
                    span.style.opacity = '1';
                    span.style.filter = 'blur(0px) brightness(100%)';
                    span.style.transform = 'translateY(0)';
                    // 次フレームで exit アニメーション付与
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            span.style.animation = '';
                            span.classList.add('exiting');
                            span.style.animationDelay = (i * STAGGER_INTERVAL) + 's';
                        });
                    });
                });

                const exitEnd = (TITLE_TEXT.length - 1) * STAGGER_INTERVAL * 1000 + 450;
                setTimeout(function () {
                    window.location.replace('index.html');
                }, exitEnd);
            }, REDIRECT_DELAY);
        })();
    </script>
</body>

</html>
